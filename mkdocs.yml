site_name: DiveRaid User Guide
site_description: User-facing documentation for user.diveraid.com (Diver first)
site_dir: site

theme:
  name: material
  language: en
  palette:
    - scheme: default
      primary: teal
      accent: amber
  features:
    - navigation.tracking
    - navigation.top
    - navigation.expand
    - content.code.copy

extra_css:
  - assets/styles/nav-icons.css
  - assets/styles/nav-fa.css

# FontAwesome (same icon set used by the Laravel app) + sidebar icon injection.
# IMPORTANT: this hotlinks the assets from your app domain; update the URL if needed.
extra_javascript:
  - https://user.diveraid.com/vendor/fontawesome/icons/js/all.min.js
  - assets/scripts/nav-fa.js

plugins:
  - search
  - i18n:
      docs_structure: folder
      languages:
        - locale: it
          name: Italiano
          default: true
          build: true
          nav_translations:
            Home: Home
            Diver: Diver
            Overview: Panoramica
            Dashboard: Dashboard
            Documents: I miei documenti
            Courses: I miei corsi
            Free Learnings: Negozio FREE-Learning
            Certifications: Le mie certificazioni
            Awards: I miei awards
            Dive Logs: Il mio Dive Log
            Store: Negozio
            Forms: Moduli Raid
        - locale: en
          name: English
          build: true
          nav_translations:
            Home: Home
            Diver: Diver
            Overview: Overview
            Dashboard: Dashboard
            Documents: Documents
            Courses: Courses
            Free Learnings: FREE-Learning shop
            Certifications: Certifications
            Awards: Awards
            Dive Logs: Dive Logs
            Store: Store
            Forms: Raid Forms
        - locale: de
