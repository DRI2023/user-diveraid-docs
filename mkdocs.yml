site_name: DiveRaid User Guide
site_description: User-facing documentation for user.diveraid.com (Diver first)
site_url: https://dri2023.github.io/user-diveraid-docs/
site_dir: site

theme:
  name: material
  language: en
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to light mode
  features:
    - navigation.tracking
    - navigation.top
    - navigation.prune
    - content.code.copy

extra_css:
  - assets/styles/nav-icons.css
  - assets/styles/nav-fa.css
  - assets/styles/rtl-ar.css

# FontAwesome (same icon set used by the Laravel app) + sidebar icon injection.
# IMPORTANT: this hotlinks the assets from your app domain; update the URL if needed.
extra_javascript:
  - https://user.diveraid.com/vendor/fontawesome/icons/js/all.min.js
  - assets/scripts/nav-fa.js
  - assets/scripts/palette-menu.js

markdown_extensions:
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

